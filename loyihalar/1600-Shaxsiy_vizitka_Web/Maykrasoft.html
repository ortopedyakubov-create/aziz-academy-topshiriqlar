<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microsoft Copilot - Live Typing AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #f1f5f9;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: #111827;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1f2937;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-box {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2px;
            width: 16px;
            height: 16px;
        }
        .box { width: 7px; height: 7px; }
        .b1 { background-color: #f25022; }
        .b2 { background-color: #7fba00; }
        .b3 { background-color: #00a4ef; }
        .b4 { background-color: #ffb900; }

        header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .coder-badge {
            background-color: #2563eb;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 850px;
            width: 100%;
            margin: 0 auto;
        }

        .message {
            padding: 14px 18px;
            border-radius: 12px;
            max-width: 85%;
            line-height: 1.6;
            font-size: 15px;
            word-wrap: break-word;
            position: relative;
        }

        .user-message {
            background-color: #2563eb;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .ai-message {
            background-color: #1f2937;
            color: #f1f5f9;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border-left: 4px solid #38bdf8;
        }

        /* Kodlar chiqadigan chiroyli qora blok */
        .code-block {
            display: block;
            background-color: #050b14;
            color: #38bdf8;
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            border: 1px solid #1e293b;
            white-space: pre-wrap;
            overflow-x: auto;
        }

        /* Pechat qilish tayog'chasi (Kursor) */
        .typing-cursor::after {
            content: "┃";
            color: #38bdf8;
            animation: blink 0.6s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* 3 ta nuqta animatsiyasi */
        .dots-container {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 5px 0;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #38bdf8;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        .input-container {
            background-color: #111827;
            padding: 20px;
            border-top: 1px solid #1f2937;
        }

        .input-box {
            max-width: 850px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
        }

        input {
            flex: 1;
            padding: 16px;
            background-color: #0b0f19;
            border: 1px solid #374151;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            outline: none;
        }

        input:focus { border-color: #38bdf8; }

        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 0 28px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover { background-color: #1d4ed8; }
        button:disabled { background-color: #4b5563; cursor: not-allowed; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="logo-box">
                <div class="box b1"></div>
                <div class="box b2"></div>
                <div class="box b3"></div>
                <div class="box b4"></div>
            </div>
            <h1>Microsoft Copilot (Live Typing)</h1>
        </div>
        <div class="coder-badge">💻 Pechat Rejimi</div>
    </header>

    <div class="chat-container" id="chatContainer">
        <div class="message ai-message" id="welcomeMessage"></div>
    </div>

    <div class="input-container">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Savol bering yoki kod so'rang, jonli yozishni ko'rasiz..." onkeypress="handleKeyPress(event)">
            <button id="sendBtn" onclick="askAI()">Yuborish</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const inputField = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        window.onload = () => {
            const welcomeText = "Salom! Qalaysiz? Men Microsoft AI yordamchisiman. Menga xohlagan savolingizni bering, men uni xuddi pechat qilgandek harfma-harf yozib beraman!";
            typeWriterEffect(welcomeText, document.getElementById('welcomeMessage'));
        };

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !sendBtn.disabled) {
                askAI();
            }
        }

        // Ovozli o'qish funksiyasi
        function speakVoice(text) {
            window.speechSynthesis.cancel();
            const cleanText = text.replace(/<div class="code-block">[\s\S]*?<\/div>/g, '[Mana kod yaratildi]').replace(/<[^>]*>/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.rate = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        // Xuddi odam yozayotgandek harfma-harf pechat qilish effekt funksiyasi
        function typeWriterEffect(htmlText, element, callback) {
            element.classList.add('typing-cursor');
            let isTag = false;
            let textIdx = 0;
            element.innerHTML = "";

            function draw() {
                if (textIdx < htmlText.length) {
                    let char = htmlText.charAt(textIdx);
                    
                    if (char === '<') isTag = true;
                    if (char === '>') { isTag = false; textIdx++; char = htmlText.charAt(textIdx); }

                    if (isTag) {
                        // Taglarni birdaniga yozish (uzilish bo'lmasligi uchun)
                        let tagEnd = htmlText.indexOf('>', textIdx);
                        element.innerHTML += htmlText.slice(textIdx, tagEnd + 1);
                        textIdx = tagEnd + 1;
                    } else {
                        element.innerHTML += char;
                        textIdx++;
                    }
                    
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                    setTimeout(draw, 25); // Pechat qilish tezligi (millisekundda)
                } else {
                    element.classList.remove('typing-cursor');
                    if (callback) callback();
                }
            }
            draw();
        }

        async function askAI() {
            const userText = inputField.value.trim();
            const question = userText.toLowerCase();
            if (question === '') return;

            sendBtn.disabled = true;
            inputField.disabled = true;

            // Foydalanuvchi xabari
            const userDiv = document.createElement('div');
            userDiv.className = 'message user-message';
            userDiv.innerText = userText;
            chatContainer.appendChild(userDiv);
            
            inputField.value = '';
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // 4 soniya davomida turadigan 3 ta nuqta animatsiyasi
            const aiDiv = document.createElement('div');
            aiDiv.className = 'message ai-message';
            aiDiv.innerHTML = `
                <div class="dots-container">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            `;
            chatContainer.appendChild(aiDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            let answerText = "";

            // 1. SALOMLASHISH VA KO'P SO'RALADIGAN SAVOLLAR
            if (question.includes("salom") || question.includes("qalaysan") || question.includes("qalay")) {
                answerText = "Salom! Qalaysiz? Men juda yaxshiman, rahmat! Bugun sizga qanday ajoyib HTML kodlar yozib beray yoki qanday savolga javob topay?";
            } 
            else if (question.includes("isming nima") || question.includes("kimsa")) {
                answerText = "Salom! Qalaysiz? Mening ismim Microsoft Copilot AI. Sizning shaxsiy aqlli yordamchingiz va dasturchi do'stingizman!";
            }
            else if (question.includes("dasturlash") || question.includes("kod nima")) {
                answerText = "Salom! Qalaysiz? Dasturlash — bu kompyuter yoki brauzer tushunadigan tilda buyruqlar yozish jarayonidir. Men hozir sizga istalgan HTML kodingizni yozib bera olaman!";
            }
            
            // 2. KOD YARATISH REJIMI (HTML so'ralganda chiroyli blokda pechat qiladi)
            else if (question.includes("kod") || question.includes("html") || question.includes("button") || question.includes("knopka") || question.includes("sayt")) {
                if (question.includes("button") || question.includes("knopka")) {
                    answerText = "Salom! Qalaysiz? Mana siz so'ragan effektli HTML knopka (button) kodi:<br><div class='code-block'>&lt;button style='background-color: #2563eb; color: white; padding: 12px 24px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;'&gt;Kodni Bosish&lt;/button&gt;</div>";
                } else if (question.includes("fon") || question.includes("yashil") || question.includes("blok")) {
                    answerText = "Salom! Qalaysiz? Mana siz so'ragan yashil fonli chiroyli matnli blok (div) kodi:<br><div class='code-block'>&lt;div style='background-color: #10b981; color: white; padding: 20px; text-align: center; border-radius: 12px;'&gt;Bu yashil blok!&lt;/div&gt;</div>";
                } else if (question.includes("input") || question.includes("yozadigan")) {
                    answerText = "Salom! Qalaysiz? Mana chiroyli matn yozadigan oyna (input) kodi:<br><div class='code-block'>&lt;input type='text' placeholder='Yozing...' style='padding: 12px; border: 2px solid #38bdf8; border-radius: 6px;'&gt;</div>";
                } else {
                    answerText = "Salom! Qalaysiz? Mana siz so'ragan boshlang'ich HTML veb-sahifa kodi:<br><div class='code-block'>&lt;!DOCTYPE html&gt;\n&lt;html&gt;\n&lt;head&gt;\n    &lt;title&gt;Sayt&lt;/title&gt;\n&lt;/head&gt;\n&lt;body&gt;\n    &lt;h1&gt;Salom Dunyo!&lt;/h1&gt;\n&lt;/body&gt;\n&lt;/html&gt;</div>";
                }
            }
            
            // 3. MATEMATIKA VA QIDIRUV
            else {
                const mathRegex = /^[0-9\+\-\*\/\(\)\.\s]+$/;
                if (mathRegex.test(question)) {
                    try {
                        const result = Function(`"use strict"; return (${question})`)();
                        answerText = `Salom! Qalaysiz? Men buni darhol hisobladim: ${userText} = ${result}`;
                    } catch (e) {
                        answerText = "Salom! Qalaysiz? Matematik misolingizda qandaydir xatolik bor shekilli, iltimos tekshirib ko'ring.";
                    }
                } else {
                    try {
                        const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(question)}&format=json&no_html=1`);
                        const data = await response.json();
                        if (data.AbstractText) {
                            answerText = "Salom! Qalaysiz? Mana men topgan ma'lumot: " + data.AbstractText;
                        } else {
                            answerText = `Salom! Qalaysiz? "${userText}" haqida chuqur o'yladim, ammo aniq ma'lumot topolmadim.`;
                        }
                    } catch (err) {
                        answerText = "Salom! Qalaysiz? Tarmoq ulanishida xatolik yuz berdi.";
                    }
                }
            }

            // Roppa-rosa 4 soniya aylanib kutgandan keyin pechat qilishni boshlaydi
            setTimeout(() => {
                // Ovoz birdaniga gapiradi, matn esa harfma-harf yoziladi
                speakVoice(answerText);
                
                typeWriterEffect(answerText, aiDiv, () => {
                    sendBtn.disabled = false;
                    inputField.disabled = false;
                    inputField.focus();
                });
            }, 4000);
        }
    </script>

</body>
</html>
