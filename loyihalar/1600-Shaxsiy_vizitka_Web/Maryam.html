
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maryam GPT 3 Abdullox</title>
    <style>
        :root {
            --bg-color: #000000; 
            --sidebar-color: rgba(0, 0, 0, 0.9); 
            --text-color: #ffffff;
            --input-bg: rgba(35, 35, 40, 0.8);
            --accent-green: #0a0035; 
            --hover-color: #252529;
            --neon-blue: #00f0ff;
            --neon-purple: #010042;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            position: relative;
        }
        #stars-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        aside { width: 260px; background: var(--sidebar-color); padding: 10px; display: flex; flex-direction: column; transition: 0.3s; z-index: 1; backdrop-filter: blur(15px); border-right: 1px solid rgba(255,255,255,0.05); }
        .new-chat-btn { border: 1px solid #000000; border-radius: 8px; padding: 12px; background: transparent; color: white; cursor: pointer; text-align: left; font-size: 14px; margin-bottom: 20px; transition: 0.2s; }
        .new-chat-btn:hover { background: var(--hover-color); }
        
        .chat-list-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chat-list-container::-webkit-scrollbar { width: 0px; background: transparent; }

        .chat-item-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .chat-item {
            flex: 1;
            padding: 10px;
            background: rgba(30, 30, 35, 0.6);
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #d1d1d1;
            border: 1px solid transparent;
            transition:1m;
        }
        .chat-item:hover, .chat-item.active {
            background: var(--hover-color);
            border-color: #0003a0;
            color: rgb(255, 255, 255);
        }
        .delete-chat-btn {
            position: absolute;
            right: 8px;
            background: transparent;
            border: none;
            color: #001aff;
            cursor: pointer;
            font-size: 12px;
            display: none;
        }
        .chat-item-wrapper:hover .delete-chat-btn {
            display: block;
        }
        .delete-chat-btn:hover { color: #ff4a4a; }

        main { flex: 1; display: flex; flex-direction: column; position: relative; align-items: center; z-index: 1; background: transparent; height: 100%; width: 100%; }
        
        #chat-window { width: 100%; max-width: 800px; flex: 1; overflow-y: auto; padding: 40px 20px; scroll-behavior: smooth; }
        #chat-window::-webkit-scrollbar { width: 6px; }
        #chat-window::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 3px; }

        .message-row { display: flex; gap: 15px; margin-bottom: 30px; animation: fadeIn 0.4s ease; width: 100%; }
        .message-row.user { justify-content: flex-end; }
        
        .avatar { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; }
        .ai .avatar::before {
            content: "⚽️";
            font-size: 26px;
            filter: drop-shadow(0 0 5px rgba(0, 47, 255, 0.911));
            animation: saturnSpin 10s infinite linear;
        }
        .user .avatar { background: #2f00ff; color: white; border-radius: 50%; font-size: 11px; font-weight: bold; }
        
        .content { max-width: 85%; line-height: 1.6; font-size: 16px; word-wrap: break-word; }
        .user .content { background: rgba(60, 60, 70, 0.85); padding: 10px 18px; border-radius: 20px; backdrop-filter: blur(5px); }
        .ai .content { background: rgba(0, 0, 0, 0.03); padding: 15px; border-radius: 15px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.05); width: 100%; }

        .play-audio-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #2a2a35;
            color: #818cf8;
            border: 1px solid #444;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
            margin-bottom: 8px;
            font-weight: bold;
            transition: 0.2s;
            user-select: none;
        }
        .play-audio-btn:hover {
            background: #4338ca;
            color: rgb(255, 255, 255);
            border-color: #6366f1;
        }
        
        pre { background: #000000; color: #1b4bb1; padding: 15px; border-radius: 8px; margin-top: 10px; overflow-x: auto; font-family: 'Consolas', monospace; font-size: 14px; border: 1px solid #222; }
        
        .input-container { width: 100%; max-width: 760px; padding: 20px; position: sticky; bottom: 0; background: transparent; }
        .input-wrapper { background: var(--input-bg); border-radius: 26px; padding: 10px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); position: relative; }
        input { flex: 1; background: transparent; border: none; color: rgb(71, 71, 71); font-size: 16px; outline: none; padding: 8px 0; }
        input::placeholder { color: #8e8e8e; }
        
        .icon-btn { background: transparent; border: none; color: #ffffff; cursor: pointer; font-size: 20px; transition: 0.2s; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .icon-btn:hover { color: rgb(255, 255, 255); background: rgba(255,255,255,0.1); }
        .send-btn { background: rgb(255, 255, 255); color: rgb(255, 255, 255); width: 32px; height: 32px; border-radius: 50%; font-size: 14px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: none; cursor: pointer; }
        .send-btn:hover { background: #646464; }
        
        .voice-wave-container {
            display: none;
            position: absolute;
            left: 50px;
            right: 60px;
            height: 35px;
            background: #232328;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .wave-bar {
            width: 3px;
            height: 6px;
            background: #6366f1;
            border-radius: 3px;
            animation: bounce 0.8s infinite ease-in-out;
        }
        .wave-bar:nth-child(9) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; }
        .wave-bar:nth-child(6) { animation-delay: 0.2s; }
        .wave-bar:nth-child(7) { animation-delay: 0.1s; }

        @keyframes bounce {
            0%, 100% { height: 6px; }
            50% { height: 26px; background: #a5b4fc; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .welcome-center { text-align: center; margin-top: 15%; width: 100%; padding: 0 20px; }
        .saturn-logo {
            font-size: 75px;
            display: inline-block;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.4)) invert(0.1);
            animation: saturnPulse 4s infinite ease-in-out, saturnSpin 25s infinite linear;
        }
        .welcome-center h1 { font-size: 26px; font-weight: 300; letter-spacing: 1px; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.1); }

        @keyframes saturnPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.3)); }
            50% { transform: scale(1.06); filter: drop-shadow(0 0 35px rgba(165, 180, 252, 0.6)); }
        }
        @keyframes saturnSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .thinking-dots {
            display: inline-flex;
            gap: 4px;
            align-items: center;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
        }
        .thinking-dots span {
            width: 8px;
            height: 8px;
            background-color: #ffffff;
            border-radius: 50%;
            display: inline-block;
            animation: dotFlashing 5s infinite linear;
        }
        .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotFlashing {
            0% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.2; transform: scale(0.8); }
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: 0.5s ease;
        }
        .modal-content {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 35px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            animation: fadeIn 0.5s ease;
        }
        .modal-content .saturn-logo { font-size: 60px; margin-bottom: 10px; }
        .modal-content h2 { font-size: 22px; margin-bottom: 10px; font-weight: 400; color: #fff; }
        .modal-content p { font-size: 14px; color: #aaa; margin-bottom: 20px; }
        .modal-input {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
            text-align: center;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .modal-input:focus { border-color: #6366f1; background: rgba(255,255,255,0.1); }
        .modal-btn {
            background: #000000;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        .modal-btn:hover { background: #4f46e5; transform: scale(1.02); }

        /* --- PREMIUM NEON KALKULYATOR VISUALI --- */
        .maryam-calc-box {
            background: rgba(18, 18, 26, 0.75);
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.25), inset 0 0 15px rgba(0, 240, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 320px;
            margin-top: 15px;
            transition: 0.3s;
        }
        .maryam-calc-title {
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.6);
            margin-bottom: 12px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .maryam-calc-screen {
            background: linear-gradient(135deg, #09090e, #13131f);
            border: 1px solid rgba(0, 240, 255, 0.3);
            box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.2);
            padding: 15px;
            border-radius: 12px;
            text-align: right;
            font-size: 24px;
            color: var(--neon-blue);
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
            font-family: 'Consolas', monospace;
            margin-bottom: 15px;
            min-height: 60px;
            word-wrap: break-word;
        }
        .maryam-calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .maryam-calc-btn {
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff; 
            padding: 14px; 
            border-radius: 10px; 
            font-size: 18px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: all 0.2s ease;
        }
        .maryam-calc-btn:hover { 
            background: rgba(0, 240, 255, 0.15); 
            color: var(--neon-blue); 
            border-color: var(--neon-blue);
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.4);
            transform: translateY(-2px);
        }
        .maryam-calc-btn:active { transform: translateY(1px); }
        
        .maryam-calc-btn.action { 
            color: var(--neon-purple); 
            background: rgba(157, 78, 221, 0.1); 
            border-color: rgba(157, 78, 221, 0.3);
        }
        .maryam-calc-btn.action:hover {
            background: rgba(157, 78, 221, 0.25);
            color: #dfb2ff;
            border-color: var(--neon-purple);
            box-shadow: 0 0 12px rgba(157, 78, 221, 0.4);
        }
        .maryam-calc-btn.equal { 
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); 
            border: none;
            color: white;
            grid-column: span 2; 
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        .maryam-calc-btn.equal:hover {
            box-shadow: 0 0 18px rgba(0, 240, 255, 0.6);
            filter: brightness(1.1);
        }

        /* --- XOTIRA VA ESKI SANAGANLAR ROYXATI --- */
        .maryam-calc-history {
            margin-top: 15px;
            border-top: 1px dashed rgba(0, 240, 255, 0.3);
            padding-top: 10px;
            max-height: 110px;
            overflow-y: auto;
        }
        .maryam-calc-history::-webkit-scrollbar { width: 3px; }
        .maryam-calc-history::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 2px; }
        .history-title {
            font-size: 11px;
            color: #8e8e8e;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
        }
        .history-item {
            font-family: 'Consolas', monospace;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.03);
            padding: 5px 8px;
            border-radius: 6px;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            color: #d1d1d1;
            border-left: 2px solid var(--neon-blue);
            cursor: pointer;
            transition: 0.2s;
        }
        .history-item:hover {
            background: rgba(0, 240, 255, 0.08);
            color: white;
        }

        /* --- INTERAKTIV BATAREYA VA TOK OQIMI --- */
        .tesla-battery-card {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--bat-color, #06b6d4);
            box-shadow: 0 0 25px var(--bat-shadow, rgba(6, 182, 212, 0.25));
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 320px;
            margin-top: 15px;
            font-family: 'Segoe UI', sans-serif;
            transition: 0.3s ease;
        }
        .tesla-battery-outer {
            width: 160px;
            height: 75px;
            border: 4px solid var(--bat-color, #06b6d4);
            border-radius: 12px;
            margin: 15px auto;
            position: relative;
            padding: 4px;
            box-shadow: inset 0 0 10px var(--bat-shadow, rgba(6, 182, 212, 0.5));
            transition: 0.3s ease;
        }
        .tesla-battery-outer::after {
            content: '';
            position: absolute;
            top: 18px;
            right: -12px;
            width: 8px;
            height: 30px;
            background: var(--bat-color, #06b6d4);
            border-radius: 0 4px 4px 0;
            transition: 0.3s ease;
        }
        .tesla-battery-core {
            height: 100%;
            background: var(--bat-gradient, linear-gradient(90deg, #06b6d4, #3b82f6));
            border-radius: 6px;
            width: 100%;
            transition: width 9s ease, background 9s ease;
            animation: batteryPulse 2s infinite ease-in-out;
        }
        @keyframes batteryPulse {
            0%, 100% { opacity: 0.85; }
            50% { opacity: 1; }
        }
        
        .tesla-power-flow {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            margin: 15px 0;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.02);
        }
        .tesla-flow-line {
            position: absolute;
            height: 100%;
            width: 50%;
            background: linear-gradient(90deg, transparent, var(--bat-color, #06b6d4), transparent);
            animation: powerStream var(--flow-speed, 1s) infinite linear;
        }
        @keyframes powerStream {
            0% { left: -50%; }
            100% { left: 100%; }
        }

        .tesla-slider {
            width: 100%;
            margin: 10px 0 5px 0;
            background: rgba(255,255,255,0.1);
            height: 6px;
            border-radius: 3px;
            outline: none;
        }
        .tesla-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--bat-color, #06b6d4);
            cursor: pointer;
            box-shadow: 0 0 8px var(--bat-color, #06b6d4);
            transition: 0.2s;
        }
        .tesla-formula-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 8px;
            font-size: 13px;
            color: #d1d1d1;
            font-family: 'Consolas', monospace;
            text-align: center;
            margin-top: 12px;
        }
    </style>
</head>
<body>

<div class="modal-overlay" id="profile-modal" style="display: none;">
    <div class="modal-content">
        <div class="saturn-logo">⚽️</div>
        <h2>Maryam GPT 3</h2>
        <p>sign in:</p>
        <input type="text" id="profile-name-input" class="modal-input" placeholder="Sign in..." autocomplete="off">
        <button class="modal-btn" id="profile-save-btn">Tizimga kirish</button>
    </div>
</div>

<canvas id="stars-canvas"></canvas>

<aside>
    <button class="new-chat-btn" onclick="startNewChat()">➕ новой чат</button>    
    <div class="chat-list-container" id="sidebar-chat-list"></div>

    <div style="margin-top: auto; font-size: 12px; color: #8e8e8e; padding: 10px; border-top: 1px solid rgba(255,255,255,0.1);">
        Yaratuvchi: <b>Abdullox</b> <br>
        Model: <b>Maryam GPT 3</b> <br>
        Foydalanuvchi: <b id="display-user-name">...</b>
    </div>
</aside>

<main>
    <div id="chat-window"></div>    
    <div class="input-container">
        <div class="input-wrapper">
            <button class="icon-btn" id="voice-btn">🎤</button>            
            <div class="voice-wave-container" id="voice-wave">
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
            </div>

            <input type="text" id="user-input" placeholder="Спросите Maryam..." autocomplete="off">
            <button class="send-btn" id="send-btn">➤</button>
        </div>
        <p style="font-size: 11px; color: #8e8e8e; text-align: center; margin-top: 10px;">
            👉Maryam GPT 3xato qilishi mumkin. Muhim ma'lumotlarni tekshiring. Мaрям GPT 3 может сделать ошибится правerте нужный вопросов.
        </p>
    </div>
</main>

<script>
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const voiceBtn = document.getElementById('voice-btn');
    const voiceWave = document.getElementById('voice-wave');
    const sidebarChatList = document.getElementById('sidebar-chat-list');    
    const profileModal = document.getElementById('profile-modal');
    const profileNameInput = document.getElementById('profile-name-input');
    const profileSaveBtn = document.getElementById('profile-save-btn');
    const displayUserName = document.getElementById('display-user-name');

    let allChats = JSON.parse(localStorage.getItem('maryam_pro2_chats')) || {};
    let currentChatId = localStorage.getItem('maryam_pro2_active_id') || null;    
    let userName = localStorage.getItem('maryam_pro2_user_name') || null;
    
    let calcMemory = JSON.parse(localStorage.getItem('maryam_calc_memory')) || [];

    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    const numStars = 150;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    for (let i = 0; i < numStars; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2,
            speed: Math.random() * 0.4 + 0.1,
            opacity: Math.random()
        });
    }

    function animateStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(255, 255, 255, 0.8)";            
        stars.forEach(star => {
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
            ctx.globalAlpha = star.opacity;
            ctx.fill();                    
            star.y += star.speed;
            star.x -= star.speed * 0.1;                    
            if (Math.random() > 0.96) {
                star.opacity = Math.random();
            }
            if (star.y > canvas.height) {
                star.y = 0;
                star.x = Math.random() * canvas.width;
            }
            if (star.x < 0) {
                star.x = canvas.width;
                star.y = Math.random() * canvas.height;
            }
        });            
        ctx.globalAlpha = 1.0;
        requestAnimationFrame(animateStars);
    }
    animateStars();

    function speak(text) {
        const synth = window.speechSynthesis;
        synth.cancel(); 
        const nText = text.replace(/<\/?[^>]+(>|$)/g, "").replace(/[*#]/g, '').substring(0, 200);
        const utter = new SpeechSynthesisUtterance(nText);
        utter.lang = 'ru-RU';
        synth.speak(utter);
    }

    window.onload = () => {
        renderSidebar();            
        if (!userName) {
            profileModal.style.display = "flex";
            profileNameInput.focus();
        } else {
            displayUserName.innerText = userName;
            if (currentChatId && allChats[currentChatId]) {
                loadChat(currentChatId);
            } else {
                showWelcomeMessage();
            }
        }
    };

    function saveProfileName() {

    function loadChat(id) {

        messages.forEach(msg => {

    function deleteChat(id) {

    function calcPress(btnValue, screenId) {
        const scr = document.getElementById(screenId);
        if(!scr) return;
        if(btnValue === 'C') {
            scr.innerText = '';
        } else if(btnValue === '=') {
            try {
                let expression = scr.innerText;
                let formula = expression.replace(/[xX]/g, '*').replace(/\^/g, '**');
                if(formula.trim() !== "") {
                    let result = eval(formula);
                    addCalcMemory(expression, result);
                    scr.innerText = result;
                    refreshAllHistoryViews();
                }
            } catch(e) {
                scr.innerText = 'Xato';
            }
        } else {
            if(scr.innerText === 'Xato') scr.innerText = '';
            scr.innerText += btnValue;
        }
    }

    function addCalcMemory(expr, res) {
        calcMemory.unshift({ expr: expr, res: res });
        if(calcMemory.length > 20) calcMemory.pop(); 
        localStorage.setItem('maryam_calc_memory', JSON.stringify(calcMemory));
    }

    function refreshAllHistoryViews() {
        document.querySelectorAll('.maryam-calc-history').forEach(histDiv => {
            histDiv.innerHTML = `<div class="history-title"><span>Eski sanaganlar:</span><span style="color:var(--neon-blue); cursor:pointer;" onclick="clearHistoryData()">O'chirish</span></div>`;
            calcMemory.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'history-item';
                itemDiv.innerHTML = `<span>${item.expr}</span><span style="color:var(--neon-blue); font-weight:bold;">= ${item.res}</span>`;
                histDiv.appendChild(itemDiv);
            });
        });
    }

    function clearHistoryData() {
        calcMemory = [];
        localStorage.setItem('maryam_calc_memory', JSON.stringify(calcMemory));
        refreshAllHistoryViews();
    }

    function updateTeslaBattery(val, cardId) {
        const card = document.getElementById(cardId);
        if(!card) return;
        
        const core = card.querySelector('.tesla-battery-core');
        const textStatus = card.querySelector('.tesla-status-text');
        
        core.style.width = val + '%';
        
        let color = '#06b6d4'; 
        let shadow = 'rgba(6, 182, 212, 0.25)';
        let gradient = 'linear-gradient(90deg, #06b6d4, #3b82f6)';
        let label = 'Charging';
        let speed = '3s';

        if(val > 70) {
            color = '#10b981'; 
            shadow = 'rgba(16, 185, 129, 0.3)';
            gradient = 'linear-gradient(90deg, #10b981, #059669)';
            label = 'Supercharged';
            speed = '0.2s';
        } else if(val < 30) {
            color = '#ef4444'; 
            shadow = 'rgba(239, 68, 68, 0.4)';
            gradient = 'linear-gradient(90deg, #ef4444, #dc2626)';
            label = 'Low Battery';
            speed = '2.5s';
        } else {
            speed = '0.8s';
        }

        if(val == 0) {
            label = 'Empty (Tok yo\'q)';
            speed = '0s';
        }

        card.style.setProperty('--bat-color', color);
        card.style.setProperty('--bat-shadow', shadow);
        card.style.setProperty('--bat-gradient', gradient);
        card.style.setProperty('--flow-speed', speed);
        
        textStatus.innerText = `Status: ${val}% ${label}`;
        textStatus.style.color = color;
    }

        if (text.includes("kod") || text.includes("код") || text.includes("python") || text.includes("html"))  return "⚽️👉Mana Abdullox tasdiqlagan professional kod namunasi : \n<pre>  print('Hello, World!')\n </code></pre> mani yana boshqa python kod \n<pre>  name = input('Ismingiz: ') yosh = int(input('Yoshingiz:')) print(f'Assalomu aleykum {name}\nYoshi:{2026-yosh}'')\n </code></pre> man yna boshqa kod \n<pre>son = 12 qoldq = 12.4 soz = 'A' gap = 'sallom nma gapla' matn =    '''lorem(30)'''     '''lorem (....)'''    'salom nam gaplar'    'salom o\'rtoq'    True, False\n </code></pre>";

        return `⚽️прстите, я не понимаю, что вы имеете в виду, ${userName}, утачните вопрос?`;
    }

    function askFollowUpQuestion(chatId, questionText) {
        if (!allChats[chatId]) return;
        allChats[chatId].push({ text: questionText, sender: 'ai' });
        localStorage.setItem('maryam_pro2_chats', JSON.stringify(allChats));

        if (currentChatId === chatId) {
            const row = appendMessageHTML("", 'ai');
            const contentDiv = row.querySelector('.content');

            const playBtn = document.createElement('button');
            playBtn.className = 'play-audio-btn';
            playBtn.innerHTML = '▶';
            playBtn.onclick = () => speak(questionText);
            contentDiv.appendChild(playBtn);

            const textContainer = document.createElement('div');
            contentDiv.appendChild(textContainer);

            let i = 0;
            function typeWriter() {
                if (i < questionText.length) {
                    textContainer.innerHTML = questionText.substring(0, i + 1);
                    i++;
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                    setTimeout(typeWriter, 12);
                } else {
                    speak(questionText);
                }
            }
            typeWriter();
        }
    }

    async function handleMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        if (!currentChatId) {
            currentChatId = 'chat_' + Date.now();
            localStorage.setItem('maryam_pro2_active_id', currentChatId);
            allChats[currentChatId] = [];
        }

        const welcome = document.getElementById('welcome-msg');
        if (welcome) welcome.remove();

        appendMessageHTML(text, 'user');
        allChats[currentChatId].push({ text: text, sender: 'user' });
        localStorage.setItem('maryam_pro2_chats', JSON.stringify(allChats));
        userInput.value = "";
        renderSidebar();

        const aiRow = appendMessageHTML("", 'ai', true);
        const contentDiv = aiRow.querySelector('.content');

        setTimeout(() => {
            const response = getSmartResponse(text);
            contentDiv.innerHTML = ""; 

            const playBtn = document.createElement('button');
            playBtn.className = 'play-audio-btn';
            playBtn.innerHTML = '▶';
            playBtn.onclick = () => speak(response);
            contentDiv.appendChild(playBtn);

            const textContainer = document.createElement('div');
            contentDiv.appendChild(textContainer);

            allChats[currentChatId].push({ text: response, sender: 'ai' });
            localStorage.setItem('maryam_pro2_chats', JSON.stringify(allChats));

            if(response.includes('maryam-calc-box') || response.includes('tesla-battery-card')) {
                textContainer.innerHTML = response;
                speak(response.includes('tesla-battery-card') ? "Mana Tesla interaktiv batareyasi" : "Mana hisob-kitob natijasi");
                chatWindow.scrollTop = chatWindow.scrollHeight;
            } else {
                let i = 0;
                function typeWriter() {
                    if (i < response.length) {
                        textContainer.innerHTML = response.substring(0, i + 1);
                        i++;
                        chatWindow.scrollTop = chatWindow.scrollHeight;
                        setTimeout(typeWriter, 12);
                    } else {
                        speak(response); 
                    }
                }
                typeWriter();
            }

        }, 1500);
    }

    function appendMessageHTML(text, sender, isThinking = false) {
        const row = document.createElement('div');
        row.className = `message-row ${sender}`;
        
        let innerBody = "";
        if (isThinking) {
            innerBody = `<div class="thinking-dots"><span></span><span></span><span></span></div>`;
        } else {
            if (sender === 'ai') {
                innerBody = `<button class="play-audio-btn" onclick="speak(\`${text.replace(/`/g, '\\`').replace(/"/g, '&quot;')}\`)">▶</button><div>${text}</div>`;
            } else {
                innerBody = text;
            }
        }

        row.innerHTML = `${sender === 'ai' ? `<div class="avatar"></div>` : ''}<div class="content">${innerBody}</div>${sender === 'user' ? `<div class="avatar">Siz</div>` : ''}`;
        chatWindow.appendChild(row);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return row;
    }

    if ('webkitSpeechRecognition' in window) {
        const recognition = new webkitSpeechRecognition();
        recognition.lang = 'uz-UZ';
        
        voiceBtn.onclick = () => { 
             recognition.start(); 
             voiceBtn.style.color = "#000000";
            voiceWave.style.display = "flex";
            userInput.style.visibility = "hidden";
            userInput.placeholder = "";
        };
        
        recognition.onresult = (event) => {
            userInput.value = event.results[0][0].transcript;
            stopVoiceAnimation();
            handleMessage();
        };

        recognition.onerror = () => { stopVoiceAnimation(); };
        recognition.onend = () => { stopVoiceAnimation(); };
    }

    function stopVoiceAnimation() {
        voiceBtn.style.color = "#000000";
        voiceWave.style.display = "none";
        userInput.style.visibility = "visible";
        userInput.placeholder = "Спросите Maryam...";
    }

    sendBtn.onclick = handleMessage;
    userInput.onkeypress = (e) => { if (e.key === 'Enter') handleMessage(); };
</script>
