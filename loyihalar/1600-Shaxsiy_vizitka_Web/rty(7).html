
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maryam Ai pro 2 by Abdullox</title>
    <style>
        :root {
            --bg-color: #0c0c0e; 
            --sidebar-color: rgba(10, 10, 15, 0.75); 
            --text-color: #ececec;
            --input-bg: rgba(25, 25, 35, 0.6);
            --accent-green: #4f46e5; 
            --hover-color: rgba(255, 255, 255, 0.08);
            --neon-blue: #00f0ff;
            --neon-purple: #9d4edd;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            color: var(--text-color); 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            position: relative;
            background: #050508; /* Zaxira fon */
            transition: background 2s ease-in-out;
        }

        /* JONLI KOSMIK DINAMIK FON CHIZMASI */
        #space-gradient-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            transition: background 3s ease-in-out;
            pointer-events: none;
        }
        #stars-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        aside { width: 280px; background: var(--sidebar-color); padding: 12px; display: flex; flex-direction: column; transition: 0.3s; z-index: 2; backdrop-filter: blur(25px); border-right: 1px solid rgba(255,255,255,0.05); }
        .new-chat-btn { border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 12px; background: rgba(255,255,255,0.03); color: white; cursor: pointer; text-align: left; font-size: 14px; margin-bottom: 10px; transition: 0.2s; backdrop-filter: blur(5px); }
        .new-chat-btn:hover { background: var(--hover-color); border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 240, 255, 0.3); }
        
        .search-wrapper { position: relative; margin-bottom: 15px; }
        .search-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 8px 10px 8px 30px; color: white; font-size: 13px; outline: none; transition: 0.2s; }
        .search-input:focus { border-color: var(--neon-blue); background: rgba(255,255,255,0.08); box-shadow: 0 0 8px rgba(0, 240, 255, 0.2); }
        .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 12px; color: #8e8e8e; pointer-events: none; }

        .chat-list-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .chat-list-container::-webkit-scrollbar { width: 0px; background: transparent; }

        .chat-item-wrapper { position: relative; display: flex; align-items: center; }
        .chat-item { flex: 1; padding: 10px; background: rgba(255, 255, 255, 0.03); border-radius: 6px; font-size: 13px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #d1d1d1; border: 1px solid rgba(255,255,255,0.02); transition: 0.2s; backdrop-filter: blur(5px); }
        .chat-item:hover, .chat-item.active { background: rgba(255,255,255,0.08); border-color: #6366f1; color: white; box-shadow: 0 0 10px rgba(99, 102, 241, 0.2); }
        .delete-chat-btn { position: absolute; right: 8px; background: transparent; border: none; color: #8e8e8e; cursor: pointer; font-size: 12px; display: none; }
        .chat-item-wrapper:hover .delete-chat-btn { display: block; }
        .delete-chat-btn:hover { color: #ff4a4a; }

        main { flex: 1; display: flex; flex-direction: column; position: relative; align-items: center; z-index: 2; background: transparent; height: 100%; width: 100%; }
        
        #chat-window { width: 100%; max-width: 800px; flex: 1; overflow-y: auto; padding: 40px 20px; scroll-behavior: smooth; position: relative; z-index: 2; }
        #chat-window::-webkit-scrollbar { width: 6px; }
        #chat-window::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 3px; }

        .message-row { display: flex; gap: 15px; margin-bottom: 30px; animation: fadeIn 0.4s ease; width: 100%; }
        .message-row.user { justify-content: flex-end; }
        
        .avatar { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; }
        .ai .avatar::before {
            content: "🌍";
            font-size: 26px;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.5));
            animation: saturnSpin 10s infinite linear;
        }
        .user .avatar { background: #5436da; color: white; border-radius: 50%; font-size: 11px; font-weight: bold; box-shadow: 0 0 10px rgba(84, 54, 218, 0.5); }
        
        .content { max-width: 85%; line-height: 1.6; font-size: 16px; word-wrap: break-word; }
        .user .content { background: rgba(55, 55, 65, 0.7); padding: 10px 18px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .ai .content { background: rgba(255, 255, 255, 0.04); padding: 15px; border-radius: 15px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }

        .play-audio-btn { display: inline-flex; align-items: center; gap: 6px; background: rgba(42, 42, 53, 0.6); color: #818cf8; border: 1px solid rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 12px; font-size: 12px; cursor: pointer; margin-bottom: 8px; font-weight: bold; transition: 0.2s; backdrop-filter: blur(5px); }
        .play-audio-btn:hover { background: #4338ca; color: white; border-color: #6366f1; box-shadow: 0 0 8px rgba(99, 102, 241, 0.4); }
        
        pre { background: rgba(10, 10, 12, 0.85); color: #d1d1d1; padding: 15px; border-radius: 8px; margin-top: 10px; overflow-x: auto; font-family: 'Consolas', monospace; font-size: 14px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(5px); }
        
        .input-container { width: 100%; max-width: 760px; padding: 20px; position: sticky; bottom: 0; background: transparent; z-index: 3; }
        .input-wrapper { background: var(--input-bg); border-radius: 26px; padding: 10px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 35px rgba(0,0,0,0.5); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); position: relative; }
        .main-input { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; padding: 8px 0; }
        .main-input::placeholder { color: rgba(255,255,255,0.4); font-weight: 500; }
        
        .icon-btn { background: transparent; border: none; color: #b4b4b4; cursor: pointer; font-size: 20px; transition: 0.2s; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .icon-btn:hover { color: white; background: rgba(255,255,255,0.1); }
        .send-btn { background: white; color: black; width: 32px; height: 32px; border-radius: 50%; font-size: 14px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: none; cursor: pointer; }
        .send-btn:hover { background: #d1d1d1; box-shadow: 0 0 10px rgba(255,255,255,0.4); }
        
        .voice-wave-container { display: none; position: absolute; left: 50px; right: 60px; height: 35px; background: rgba(30,30,40,0.8); backdrop-filter: blur(5px); border-radius: 10px; align-items: center; justify-content: center; gap: 4px; }
        .wave-bar { width: 3px; height: 6px; background: #6366f1; border-radius: 3px; animation: bounce 0.8s infinite ease-in-out; }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; }
        .wave-bar:nth-child(6) { animation-delay: 0.2s; }
        .wave-bar:nth-child(7) { animation-delay: 0.1s; }

        @keyframes bounce { 0%, 100% { height: 6px; } 50% { height: 26px; background: #a5b4fc; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .welcome-center { text-align: center; margin-top: 15%; width: 100%; padding: 0 20px; relative; z-index: 2; }
        .saturn-logo {
            font-size: 75px;
            display: inline-block;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 25px rgba(255, 165, 0, 0.6));
            animation: saturnPulse 4s infinite ease-in-out, saturnSpin 25s infinite linear;
        }
        .welcome-center h1 { font-size: 26px; font-weight: 300; letter-spacing: 1px; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.4); }

        @keyframes saturnPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(255, 165, 0, 0.5)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 40px rgba(255, 200, 100, 0.8)); }
        }
        @keyframes saturnSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .thinking-dots { display: inline-flex; gap: 4px; align-items: center; padding: 10px 15px; background: rgba(255, 255, 255, 0.05); border-radius: 15px; }
        .thinking-dots span { width: 8px; height: 8px; background-color: #6366f1; border-radius: 50%; display: inline-block; animation: dotFlashing 1.4s infinite linear; }
        .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotFlashing { 0% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.2; transform: scale(0.8); } }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 8, 0.9); backdrop-filter: blur(25px); display: flex; align-items: center; justify-content: center; z-index: 9999; transition: 0.5s ease; }
        .modal-content { background: rgba(20, 20, 25, 0.85); border: 1px solid rgba(255,255,255,0.1); padding: 35px; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.7); animation: fadeIn 0.5s ease; backdrop-filter: blur(10px); }
        .modal-content .saturn-logo { font-size: 60px; margin-bottom: 10px; }
        .modal-content h2 { font-size: 22px; margin-bottom: 10px; font-weight: 400; color: #fff; }
        .modal-content p { font-size: 14px; color: #aaa; margin-bottom: 20px; }
        .modal-input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); padding: 12px 20px; border-radius: 12px; color: white; font-size: 16px; outline: none; text-align: center; margin-bottom: 20px; transition: 0.3s; }
        .modal-input:focus { border-color: #6366f1; background: rgba(255,255,255,0.1); }
        .modal-btn { background: #6366f1; color: white; border: none; padding: 12px 30px; font-size: 15px; font-weight: bold; border-radius: 12px; cursor: pointer; width: 100%; transition: 0.2s; }
        .modal-btn:hover { background: #4f46e5; transform: scale(1.02); }

        /* KALKULYATOR VA TESLA KARTALARI SHAFFAF OYNA REJIMIDA (GLASSMORPHISM) */
        .maryam-calc-box {
            background: rgba(15, 15, 25, 0.65);
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.25), inset 0 0 15px rgba(0, 240, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 320px;
            margin-top: 15px;
            transition: 0.3s;
        }
        .maryam-calc-title { text-align: center; font-size: 14px; font-weight: bold; letter-spacing: 1px; color: var(--neon-blue); text-shadow: 0 0 10px rgba(0, 240, 255, 0.6); margin-bottom: 12px; }
        .maryam-calc-screen { background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(0, 240, 255, 0.3); box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.2); padding: 15px; border-radius: 12px; text-align: right; font-size: 24px; color: var(--neon-blue); text-shadow: 0 0 8px rgba(0, 240, 255, 0.6); font-family: 'Consolas', monospace; margin-bottom: 15px; min-height: 60px; word-wrap: break-word; }
        .maryam-calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .maryam-calc-btn { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); color: #fff; padding: 14px; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; transition: all 0.2s ease; }
        .maryam-calc-btn:hover { background: rgba(0, 240, 255, 0.15); color: var(--neon-blue); border-color: var(--neon-blue); box-shadow: 0 0 12px rgba(0, 240, 255, 0.4); transform: translateY(-2px); }
        
        .maryam-calc-btn.action { color: var(--neon-purple); background: rgba(157, 78, 221, 0.1); border-color: rgba(157, 78, 221, 0.3); }
        .maryam-calc-btn.action:hover { background: rgba(157, 78, 221, 0.25); color: #dfb2ff; border-color: var(--neon-purple); }
        .maryam-calc-btn.equal { background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); border: none; color: white; grid-column: span 2; }

        .maryam-calc-history { margin-top: 15px; border-top: 1px dashed rgba(0, 240, 255, 0.3); padding-top: 10px; max-height: 110px; overflow-y: auto; }
        .history-title { font-size: 11px; color: #8e8e8e; margin-bottom: 6px; display: flex; justify-content: space-between; }
        .history-item { font-family: 'Consolas', monospace; font-size: 12px; background: rgba(255, 255, 255, 0.03); padding: 5px 8px; border-radius: 6px; margin-bottom: 4px; display: flex; justify-content: space-between; color: #d1d1d1; border-left: 2px solid var(--neon-blue); }

        .tesla-battery-card { background: rgba(10, 15, 30, 0.7); border: 1px solid var(--bat-color, #06b6d4); box-shadow: 0 0 25px var(--bat-shadow, rgba(6, 182, 212, 0.25)); border-radius: 16px; padding: 20px; width: 100%; max-width: 320px; margin-top: 15px; backdrop-filter: blur(15px); }
        .tesla-battery-outer { width: 160px; height: 75px; border: 4px solid var(--bat-color, #06b6d4); border-radius: 12px; margin: 15px auto; position: relative; padding: 4px; }
        .tesla-battery-outer::after { content: ''; position: absolute; top: 18px; right: -12px; width: 8px; height: 30px; background: var(--bat-color, #06b6d4); border-radius: 0 4px 4px 0; }
        .tesla-battery-core { height: 100%; background: var(--bat-gradient, linear-gradient(90deg, #06b6d4, #3b82f6)); border-radius: 6px; width: 100%; }
        .tesla-power-flow { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.05); border-radius: 3px; margin: 15px 0; position: relative; overflow: hidden; }
        .tesla-flow-line { position: absolute; height: 100%; width: 50%; background: linear-gradient(90deg, transparent, var(--bat-color, #06b6d4), transparent); animation: powerStream var(--flow-speed, 1s) infinite linear; }
        @keyframes powerStream { 0% { left: -50%; } 100% { left: 100%; } }
        .tesla-slider { width: 100%; margin: 10px 0 5px 0; -webkit-appearance: none; background: rgba(255,255,255,0.1); height: 6px; border-radius: 3px; }
        .tesla-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--bat-color, #06b6d4); cursor: pointer; }
        .tesla-formula-box { background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 8px; font-size: 13px; color: #d1d1d1; text-align: center; margin-top: 12px; }
    </style>
</head>
<body>

<div id="space-gradient-bg"></div>
<canvas id="stars-canvas"></canvas>

<div class="modal-overlay" id="profile-modal" style="display: none;">
    <div class="modal-content">
        <div class="saturn-logo">⚽️</div>
        <h2>Maryam GPT 3</h2>
        <p>Iltimos, botdan foydalanish uchun ismingizni kiriting:</p>
        <input type="text" id="profile-name-input" class="modal-input" placeholder="Ismingiz..." autocomplete="off">
        <button class="modal-btn" id="profile-save-btn">sign in</button>
    </div>
</div>

<aside>
    <button class="new-chat-btn" onclick="startNewChat()">➕ Yangi suhbat</button>    
    
    <div class="search-wrapper">
        <span class="search-icon">🌍</span>
        <input type="text" id="search-chats-input" class="search-input" placeholder="Eski chatlarni qidirish..." oninput="searchChats()">
    </div>

    <div class="chat-list-container" id="sidebar-chat-list"></div>

    <div style="margin-top: auto; font-size: 12px; color: #8e8e8e; padding: 10px; border-top: 1px solid rgba(255,255,255,0.1);">
        Yaratuvchi: <b>Abdullox</b> <br>
        Model: <b>Maryam GPT 3</b> <br>
        Foydalanuvchi: <b id="display-user-name">...</b>
    </div>
</aside>

<main>
    <div id="chat-window"></div>    
    <div class="input-container">
        <div class="input-wrapper">
            <button class="icon-btn" id="voice-btn">🎤</button>            
            <div class="voice-wave-container" id="voice-wave">
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
            </div>

            <input type="text" id="user-input" class="main-input" placeholder="Спросите Maryam" autocomplete="off">
            <button class="send-btn" id="send-btn">⬆</button>
        </div>
        <p style="font-size: 11px; color: rgba(255,255,255,0.4); text-align: center; margin-top: 10px;">
            👉Maryam GPT 3 xato qilishi mumkin. Muhim ma'lumotlarni tekshiring. Мaрям GPT 3 может сделать ошибится праверте нужный вопросов.
        </p>
    </div>
</main>

<script>
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const voiceBtn = document.getElementById('voice-btn');
    const voiceWave = document.getElementById('voice-wave');
    const sidebarChatList = document.getElementById('sidebar-chat-list');    
    const profileModal = document.getElementById('profile-modal');
    const profileNameInput = document.getElementById('profile-name-input');
    const profileSaveBtn = document.getElementById('profile-save-btn');
    const displayUserName = document.getElementById('display-user-name');
    const searchInput = document.getElementById('search-chats-input');
    const spaceBg = document.getElementById('space-gradient-bg');

    let allChats = JSON.parse(localStorage.getItem('maryam_pro2_chats')) || {};
    let currentChatId = localStorage.getItem('maryam_pro2_active_id') || null;    
    let userName = localStorage.getItem('maryam_pro2_user_name') || null;
    let calcMemory = JSON.parse(localStorage.getItem('maryam_calc_memory')) || [];

    // HAR 1 SOATDA O'ZGARADIGAN DASTURLASH KOSMIK GRADIENTLARI (FON)
    const spaceGradients = [
        "radial-gradient(circle at 50% 50%, #0d0b21 0%, #050508 100%)", // 00:00 - Chuqur tungi kosmos
        "radial-gradient(circle at 30% 20%, #150a21 0%, #06040a 100%)", // 01:00 - Tumanlik binafsha
        "radial-gradient(circle at 70% 80%, #08162b 0%, #03060f 100%)", // 02:00 - To'q neon ko'k
        "radial-gradient(circle at 40% 40%, #1c091d 0%, #070208 100%)", // 03:00 - Kiberpank tumanligi
        "radial-gradient(circle at 50% 30%, #051c24 0%, #02070a 100%)", // 04:00 - Shimol yog'dusi foni
        "radial-gradient(circle at 80% 20%, #1a0f1e 0%, #08050a 100%)", // 05:00 - Yulduzlar tug'ilishi foni
        "radial-gradient(circle at 20% 70%, #0a1820 0%, #03070a 100%)", // 06:00 - Zaytun va qora koinot
        "radial-gradient(circle at 50% 50%, #161026 0%, #050408 100%)", // 07:00 - Quyosh tutilishi foni
        "radial-gradient(circle at 30% 60%, #0a1f2d 0%, #02080c 100%)", // 08:00 - Chuqur okean koinoti
        "radial-gradient(circle at 60% 40%, #1f0b18 0%, #0a0308 100%)", // 09:00 - Andromeda galaktikasi
        "radial-gradient(circle at 40% 80%, #0f1026 0%, #04040a 100%)", // 10:00 - Alfa Sentavr foni
        "radial-gradient(circle at 50% 20%, #1c152d 0%, #08060e 100%)", // 11:00 - To'q binafsha koinot
        "radial-gradient(circle at 70% 30%, #092437 0%, #02090f 100%)", // 12:00 - Yorqin ko'k plazma
        "radial-gradient(circle at 20% 40%, #251230 0%, #09040c 100%)", // 13:00 - Kosmik qizg'ish tumanlik
        "radial-gradient(circle at 50% 70%, #0e293a 0%, #030c12 100%)", // 14:00 - Kvant maydoni foni
        "radial-gradient(circle at 80% 60%, #1e112a 0%, #07040a 100%)", // 15:00 - Qora tuynuk atrofi foni
        "radial-gradient(circle at 30% 30%, #0d2830 0%, #030b0e 100%)", // 16:00 - Neon firuza fazosi
        "radial-gradient(circle at 60% 70%, #291428 0%, #0c050b 100%)", // 17:00 - Gravitatsion to'lqin foni
        "radial-gradient(circle at 40% 50%, #121536 0%, #04050f 100%)", // 18:00 - Quyosh botgandagi koinot
        "radial-gradient(circle at 50% 80%, #211235 0%, #08040d 100%)", // 19:00 - Magnit bo'roni foni
        "radial-gradient(circle at 70% 20%, #0b2d3d 0%, #030e14 100%)", // 20:00 - Kiber neon tuni
        "radial-gradient(circle at 20% 80%, #1b1030 0%, #06030c 100%)", // 21:00 - Somon yo'li o'qi
        "radial-gradient(circle at 50% 40%, #092c3a 0%, #020d12 100%)", // 22:00 - Supernova portlashi foni
        "radial-gradient(circle at 80% 80%, #28112d 0%, #0a040b 100%)"  // 23:00 - Sirli qorong'u materiya
    ];

    // FONNI SOATGA QARAB YANGILASH FUNKSIYASI
    function updateSpaceBackground() {
        const currentHour = new Date().getHours();
        spaceBg.style.background = spaceGradients[currentHour];
        console.log("Maryam GPT 3 foni yangilandi. Hozirgi soat: " + currentHour);
    }
    
    // Tizim ishga tushganda va har 5 daqiqada soatni tekshirib turadi
    updateSpaceBackground();
    setInterval(updateSpaceBackground, 60000 * 5);

    // YULDUZLAR CANVAS ANIMATSIYASI
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    const numStars = 140;

    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    for (let i = 0; i < numStars; i++) {
        stars.push({ 
            x: Math.random() * canvas.width, 
            y: Math.random() * canvas.height, 
            size: Math.random() * 1.8 + 0.2, 
            speed: Math.random() * 0.2 + 0.05, 
            opacity: Math.random(),
            flashSpeed: Math.random() * 0.02 + 0.005,
            goingUp: Math.random() > 0.5
        });
    }

    function animateStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(star => {
            ctx.beginPath(); 
            ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2); 
            ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
            ctx.fill();                    
            
            star.y += star.speed; 
            star.x -= star.speed * 0.05;                    
            
            if(star.goingUp) {
                star.opacity += star.flashSpeed;
                if(star.opacity >= 0.9) star.goingUp = false;
            } else {
                star.opacity -= star.flashSpeed;
                if(star.opacity <= 0.1) star.goingUp = true;
            }

            if (star.y > canvas.height) { 
                star.y = 0; 
                star.x = Math.random() * canvas.width; 
            }
        });            
        requestAnimationFrame(animateStars);
    }
    animateStars();

    function speak(text) {
        const synth = window.speechSynthesis; synth.cancel(); 
        const nText = text.replace(/<\/?[^>]+(>|$)/g, "").replace(/[*#]/g, '').substring(0, 200);
        const utter = new SpeechSynthesisUtterance(nText); utter.lang = 'ru-RU'; synth.speak(utter);
    }

    window.onload = () => {
        renderSidebar();            
        if (!userName) {
            profileModal.style.display = "flex"; profileNameInput.focus();
        } else {
            displayUserName.innerText = userName;
            if (currentChatId && allChats[currentChatId]) {
                loadChat(currentChatId, false);
            } else {
                showWelcomeMessage();
            }
        }
    };

    function saveProfileName() {
        const enteredName = profileNameInput.value.trim();
        if (enteredName) {
            userName = enteredName.charAt(0).toUpperCase() + enteredName.slice(1);
            localStorage.setItem('maryam_pro2_user_name', userName);
            displayUserName.innerText = userName;
            profileModal.style.opacity = "0";
            setTimeout(() => { profileModal.style.display = "none"; showWelcomeMessage(); }, 500);
        }
    }
    profileSaveBtn.onclick = saveProfileName;
    profileNameInput.onkeypress = (e) => { if (e.key === 'Enter') saveProfileName(); };

    function showWelcomeMessage() {
        chatWindow.innerHTML = `
            <div id="welcome-msg" class="welcome-center">
                <div class="saturn-logo">🪐</div>
                <h1>✨Здраствуйте ${userName}?</h1>
            </div>`;
    }

    function renderSidebar(filterText = "") {
        sidebarChatList.innerHTML = "";
        const cleanFilter = filterText.toLowerCase().trim();

        Object.keys(allChats).reverse().forEach(id => {
            const messages = allChats[id] || [];
            const firstMsgText = messages[0] ? messages[0].text : "Yangi chat";
            
            if (cleanFilter && !firstMsgText.toLowerCase().includes(cleanFilter)) {
                return; 
            }

            const wrapper = document.createElement('div');
            wrapper.className = 'chat-item-wrapper';

            const item = document.createElement('div');
            item.className = `chat-item ${id === currentChatId ? 'active' : ''}`;                    
            item.innerText = firstMsgText.substring(0, 24) + (firstMsgText.length > 24 ? "..." : "");
            item.onclick = () => loadChat(id, true);

            const delBtn = document.createElement('button');
            delBtn.className = 'delete-chat-btn';
            delBtn.innerHTML = '❌';
            delBtn.onclick = (e) => { e.stopPropagation(); deleteChat(id); };

            wrapper.appendChild(item);
            wrapper.appendChild(delBtn);
            sidebarChatList.appendChild(wrapper);
        });
    }

    function searchChats() { renderSidebar(searchInput.value); }

    function startNewChat() {
        currentChatId = 'chat_' + Date.now();
        localStorage.setItem('maryam_pro2_active_id', currentChatId);
        allChats[currentChatId] = [];
        chatWindow.innerHTML = "";
        showWelcomeMessage();
        renderSidebar();
        userInput.focus();
    }

    function loadChat(id, triggerAnalysis = false) {
        currentChatId = id;
        localStorage.setItem('maryam_pro2_active_id', id);
        chatWindow.innerHTML = "";
        renderSidebar(searchInput.value);

        const messages = allChats[id] || [];
        messages.forEach(msg => { appendMessageHTML(msg.text, msg.sender); });

        if (triggerAnalysis && messages.length > 0) {
            let lastUserMsg = "";
            for(let i = messages.length - 1; i >= 0; i--) {
                if(messages[i].sender === 'user') { lastUserMsg = messages[i].text.toLowerCase(); break; }
            }

            let alertText = `✨ Oxirgi marta suhbatlashgan mavzuni ko'rib turibman, **${userName}**! `;
            if (lastUserMsg.includes('kod') || lastUserMsg.includes('python') || lastUserMsg.includes('html')) {
                alertText += `\n<pre>Oxirgi marta qandaydir dasturlash kodi ustida ishlayotgan edik. Kodingizni davom ettiramizmi? Nima qilish kerak deb o'ylaysiz? 👨🏻‍💻🚀\n </code></pre>`;
            } else if (lastUserMsg.includes('kalkulyator') || lastUserMsg.includes('hisobla') || /^[0-9+\-*/().\s^]+$/.test(lastUserMsg)) {
                alertText += `\n<pre>Oxirgi marta mukammal kalkulyatorda hisob-kitob qilayotgan ekansiz. Yana qanday misollarni yechishimiz kerak? 🪐🧮\n </code></pre>`;
            } else if (lastUserMsg.includes('tesla') || lastUserMsg.includes('fizika') || lastUserMsg.includes('nyuton')) {
                alertText += `\n<pre>Oxirgi marta ajoyib fizika qonunlari va Tesla Smart tizimini o'rganayotgan ekanmiz. Darsni davom ettiramizmi? ⚡️🍏\n </code></pre>`;
         } else if (lastUserMsg.includes('salom') || lastUserMsg.includes('assalom') || lastUserMsg.includes('hello')) {
            alertText += `\n<pre>Salom, ${userName}! Qanday yordam bera olaman? 🙋‍♀️\n </code></pre>`;
            } else {
                alertText += `Ushbu suhbat tarixini ko'rdim. Buni davom ettiramizmi yoki yangi rejalaringiz bormi? Menga buyruq bering! 😉🔥`;
            }

            setTimeout(() => { askFollowUpQuestion(id, alertText); }, 1000);
        }
    }

    function deleteChat(id) {
        delete allChats[id];
        localStorage.setItem('maryam_pro2_chats', JSON.stringify(allChats));
        if (currentChatId === id) { currentChatId = null; localStorage.removeItem('maryam_pro2_active_id'); showWelcomeMessage(); }
        renderSidebar(searchInput.value);
    }

    function calcPress(btnValue, screenId) {
        const scr = document.getElementById(screenId); if(!scr) return;
        if(btnValue === 'C') { scr.innerText = ''; } 
        else if(btnValue === '=') {
            try {
                let expression = scr.innerText;
                let formula = expression.replace(/[xX]/g, '*').replace(/\^/g, '**');
                if(formula.trim() !== "") {
                    let result = eval(formula); addCalcMemory(expression, result); scr.innerText = result; refreshAllHistoryViews();
                }
            } catch(e) { scr.innerText = 'Xato'; }
        } else {
            if(scr.innerText === 'Xato') scr.innerText = ''; scr.innerText += btnValue;
        }
    }

    function addCalcMemory(expr, res) {
        calcMemory.unshift({ expr: expr, res: res }); if(calcMemory.length > 20) calcMemory.pop(); 
        localStorage.setItem('maryam_calc_memory', JSON.stringify(calcMemory));
    }

    function refreshAllHistoryViews() {
        document.querySelectorAll('.maryam-calc-history').forEach(histDiv => {
            histDiv.innerHTML = `<div class="history-title"><span>Eski sanaganlar:</span><span style="color:var(--neon-blue); cursor:pointer;" onclick="clearHistoryData()">O'chirish</span></div>`;
            calcMemory.forEach(item => {
                const itemDiv = document.createElement('div'); itemDiv.className = 'history-item';
                itemDiv.innerHTML = `<span>${item.expr}</span><span style="color:var(--neon-blue); font-weight:bold;">= ${item.res}</span>`;
                histDiv.appendChild(itemDiv);
            });
        });
    }

    function clearHistoryData() { calcMemory = []; localStorage.setItem('maryam_calc_memory', JSON.stringify(calcMemory)); refreshAllHistoryViews(); }

    function updateTeslaBattery(val, cardId) {
        const card = document.getElementById(cardId); if(!card) return;
        const core = card.querySelector('.tesla-battery-core'); const textStatus = card.querySelector('.tesla-status-text');
        core.style.width = val + '%';
        let color = '#06b6d4'; let label = 'Charging'; let speed = '1s';
        if(val > 70) { color = '#10b981'; label = 'Supercharged'; speed = '0.2s'; } 
        else if(val < 30) { color = '#ef4444'; label = 'Low Battery'; speed = '2.5s'; }
        card.style.setProperty('--bat-color', color); card.style.setProperty('--flow-speed', speed);
        textStatus.innerText = `Status: ${val}% ${label}`; textStatus.style.color = color;
    }

    function getSmartResponse(input) {
        const text = input.toLowerCase().trim();
        const cleanMath = text.replace(/[xX]/g, '*').replace(/\^/g, '**');
        const isDirectMath = /^[0-9+\-*/().\s^]+$/.test(cleanMath) && /[+\-*/^]/.test(cleanMath);

        if (isDirectMath || text.includes("kalkulyator") || text.includes("kankulator") || text.includes("калькулятор")) {
            const uniqueId = 'calc_' + Date.now();
            let initialScreenValue = isDirectMath ? text.toUpperCase() : "";
            let calculatedResult = "";
            if (isDirectMath) { try { calculatedResult = eval(cleanMath); addCalcMemory(initialScreenValue, calculatedResult); } catch(e){} }
            let historyHTML = ""; calcMemory.forEach(item => { historyHTML += `<div class="history-item"><span>${item.expr}</span><span style="color:var(--neon-blue); font-weight:bold;">= ${item.res}</span></div>`; });

            return `✨ Hisob-kitob bajarildi va tizim xotirasiga muhrlandi:
            <div class="maryam-calc-box">
                <div class="maryam-calc-title">🪐Maryam GPT 3 kalkulyator</div>
                <div class="maryam-calc-screen" id="${uniqueId}">${calculatedResult !== "" ? calculatedResult : initialScreenValue}</div>
                <div class="maryam-calc-grid">
                    <button class="maryam-calc-btn action" onclick="calcPress('C', '${uniqueId}')">C</button>
                    <button class="maryam-calc-btn action" onclick="calcPress('^', '${uniqueId}')">^</button>
                    <button class="maryam-calc-btn action" onclick="calcPress('/', '${uniqueId}')">/</button>
                    <button class="maryam-calc-btn action" onclick="calcPress('*', '${uniqueId}')">X</button>
                    <button class="maryam-calc-btn" onclick="calcPress('7', '${uniqueId}')">7</button>
                    <button class="maryam-calc-btn" onclick="calcPress('8', '${uniqueId}')">8</button>
                    <button class="maryam-calc-btn" onclick="calcPress('9', '${uniqueId}')">9</button>
                    <button class="maryam-calc-btn action" onclick="calcPress('-', '${uniqueId}')">-</button>
                    <button class="maryam-calc-btn" onclick="calcPress('4', '${uniqueId}')">4</button>
                    <button class="maryam-calc-btn" onclick="calcPress('5', '${uniqueId}')">5</button>
                    <button class="maryam-calc-btn" onclick="calcPress('6', '${uniqueId}')">6</button>
                    <button class="maryam-calc-btn action" onclick="calcPress('+', '${uniqueId}')">+</button>
                    <button class="maryam-calc-btn" onclick="calcPress('1', '${uniqueId}')">1</button>
                    <button class="maryam-calc-btn" onclick="calcPress('2', '${uniqueId}')">2</button>
                    <button class="maryam-calc-btn" onclick="calcPress('3', '${uniqueId}')">3</button>
                    <button class="maryam-calc-btn" onclick="calcPress('.', '${uniqueId}')">.</button>
                    <button class="maryam-calc-btn" onclick="calcPress('0', '${uniqueId}')">0</button>
                    <button class="maryam-calc-btn equal" onclick="calcPress('=', '${uniqueId}')">=</button>
                </div>
                <div class="maryam-calc-history">
                    <div class="history-title"><span>Eski sanaganlar:</span><span style="color:var(--neon-blue); cursor:pointer;" onclick="clearHistoryData()">O'chirish</span></div>
                    ${historyHTML}
                </div>
            </div>`;
        }

        if (text === "😂" || text === "🤣" || text.includes("😂😂")) return `✨Xaxaxa! Kulgi umrni uzaytiradi, **${userName}**! Kayfiyatingiz har doim zo'r bo'lsin! 🥳🎈`;
        if (text === "😎" || text === "🔥" || text === "⚡" || text.includes("zo'r") || text.includes("zor")) return `✨Ooo, **${userName}**! Tizim dizayni kabi juda kreativ va kuchlisiz! 👑🚀`;
        if (text === "😢" || text === "😭" || text.includes("xafa")) return `✨Iye, **${userName}**, nega xafasiz? Siqilmang, men har doim Abdullohning yonidaman! 💪🪐`;
        if (text === "😡" || text === "😠") return `✨Jahlingiz chiqmasin, **${userName}**. Miyadagi neyronlarni asraymiz va Python yozaveramiz! 🍎⚡`;
        if (text === "😴" || text === "💤") return `✨Charchadingizmi? Unda shirin uyqu! Ertaga yangi kuch bilan chiroyli kodlar yozasiz! 🌙💤`;

        if (text.includes("tesla") || text.includes("batare") || text.includes("tok")) {
            const uniqueCardId = 'tesla_' + Date.now();
            return `⚡️ **Tesla Smart Power Hub:**\nB = F / (q * v)\n<div class="tesla-battery-card" id="${uniqueCardId}"><div style="text-align:center; font-weight:bold; color:var(--bat-color,#06b6d4);">⚡ TESLA SMART HUB 🔋</div><div class="tesla-battery-outer"><div class="tesla-battery-core"></div></div><div class="tesla-status-text" style="text-align:center;font-weight:bold;margin-top:5px;">Status: 100% Supercharged</div><div class="tesla-power-flow"><div class="tesla-flow-line"></div></div><input type="range" class="tesla-slider" min="0" max="100" value="100" oninput="updateTeslaBattery(this.value, '${uniqueCardId}')"><div class="tesla-formula-box">E = C * V^2 / 2</div></div>`;
        }

        if (text.includes("maktab") && (text.includes("boraman") || text.includes("ketaman"))) {
            const timeMatch = text.match(/(\d{1,2}):(\d{2})/);
            let timeStr = timeMatch ? `soat ${timeMatch[0]}da ` : "";                    
            const targetChatId = currentChatId;
            setTimeout(() => { askFollowUpQuestion(targetChatId, `✨${userName}, maktabdan qaytdingizmi yoki darslar qalay bo'lyapti? 🪐`); }, 15000); 
            return `✨Yaxshi, **${userName}**! Sizning ${timeStr}maktabga ketishingizni eslab qoldim! Oq yo'l! 😉`;
        }

        if (text.includes("привет") || text.includes("здраствуй")) return `✨Здраствуйте уважаймый **${userName}** вам что помогу? Я знаю шитать физику, писать python и решать AL AZIZ.`;
        if (text.includes("isming") || text.includes("oting")) return `✨Mening ismim **Maryam Ai pro**. Meni **Abdulloh** ismli kuchli dasturchi yaratgan. Sizning ismingiz esa **${userName}**!`;
        if (text.includes("abdulloh kim")) return "✨Abdulloh - mening asoschim, eng aqlli va daho dasturchi!";
        if (text.includes("salom") || text.includes("assalom")) return `✨Assalomu alaykum, **${userName}**! Qanday yordam bera olaman?`;
         if (text.includes("salom") || text.includes("assalom")) return `✨Assalomu alaykum, **${userName}**! Qanday yordam bera olaman?`;
        if (text.includes("enshteyn")) return " ✨Enshteyn - kuchli fizik, 1879-yili 14-martda tug'ilgan. Formulari:  \n<pre>E = mc^2! ✡️\n </code></pre>";
        if (text.includes("nyuton")) return "Nyuton - daho fizik, 1643-yil 4-yanvarda tug'ilgan. Formula:  \n<pre>F = m*a 🍎\n </code></pre>";
        if (text.includes("тесла кто")) return "Tesla - сильный физик, родился 10 июня 1856 г. Формула:  \n<pre>B = F/(q*v) ⚡️./E = C * V^2 / 2\n </code></pre>";
        if (text.includes("bugun sana")) return "✨Bugun 2026-yil 9-iyun seshanba kuni! 🗓️";
        if (text.includes("al azizni 4")) return "✨Xato qilmasdan yozing: \nx = input()\na, b = x.split()\nprint(int(a)*float(b))\nUstozingizni yaxshilab eshiting! 🧐";
        if (text.includes("al azizni 1")) return "✨Javob:\n<pre>print('Python ishga tushdi!')\n </code></pre>";
        if (text.includes("al azizni 3")) return "✨Javob: \n<pre>x = input()\na, b = x.split()\nprint(int(a) + int(b))\n </code></pre>";
        if (text.includes("al azizni 2")) return "✨Javob: \n<pre>print('Assalomu alaykum')\nprint('Bu mening birinchi Python dasturim')\n </code></pre>";
        if (text.includes("kod") || text.includes("html") || text.includes("python")) return "✨👉Professional kod namunasi:\n<pre>  print('Hello, World!')\n </code></pre> mani yana boshqa python kod \n<pre>  name = input('Ismingiz: ') yosh = int(input('Yoshingiz:')) print(f'Assalomu aleykum {name}\nYoshi:{2026-yosh}'')\n </code></pre> man yna boshqa kod \n<pre>son = 12 qoldq = 12.4 soz = 'A' gap = 'sallom nma gapla' matn =    '''lorem(30)'''     '''lorem (....)'''    'salom nam gaplar'    'salom o\'rtoq'    True, False\n </code></pre>";

        return `✨Kechirasiz Hato, **${userName}**! Boshqa narsani so'rang lekin o'zingiz ham tekshiring. Men hali buni o'rganmaganman.`;
    }

    function askFollowUpQuestion(chatId, questionText) {
        if (!allChats[chatId]) return;
        allChats[chatId].push({ text: questionText, sender: 'ai' });
        localStorage.setItem('maryam_pro2_chats', JSON.stringify(allChats));

        if (currentChatId === chatId) {
            const row = appendMessageHTML("", 'ai'); const contentDiv = row.querySelector('.content');
            const playBtn = document.createElement('button'); playBtn.className = 'play-audio-btn'; playBtn.innerHTML = '▶';
            playBtn.onclick = () => speak(questionText); contentDiv.appendChild(playBtn);
            const textContainer = document.createElement('div'); contentDiv.appendChild(textContainer);

            let i = 0;
            function typeWriter() {
                if (i < questionText.length) { textContainer.innerHTML = questionText.substring(0, i + 1); i++; chatWindow.scrollTop = chatWindow.scrollHeight; setTimeout(typeWriter, 12); } 
                else { speak(questionText); }
            }
            typeWriter();
        }
    }

    async function handleMessage() {
        const text = userInput.value.trim(); if (!text) return;
        if (!currentChatId) { currentChatId = 'chat_' + Date.now(); localStorage.setItem('maryam_pro2_active_id', currentChatId); allChats[currentChatId] = []; }

        const welcome = document.getElementById('welcome-msg'); if (welcome) welcome.remove();

        appendMessageHTML(text, 'user');
        allChats[currentChatId].push({ text: text, sender: 'user' });
        localStorage.setItem('maryam_pro2_chats', JSON.stringify(allChats));
        userInput.value = ""; renderSidebar(searchInput.value);
        
        

        const aiRow = appendMessageHTML("", 'ai', true); const contentDiv = aiRow.querySelector('.content');

        setTimeout(() => {
            const response = getSmartResponse(text); contentDiv.innerHTML = ""; 
            const playBtn = document.createElement('button'); playBtn.className = 'play-audio-btn'; playBtn.innerHTML = '▶';
            playBtn.onclick = () => speak(response); contentDiv.appendChild(playBtn);
            const textContainer = document.createElement('div'); contentDiv.appendChild(textContainer);

            allChats[currentChatId].push({ text: response, sender: 'ai' });
            localStorage.setItem('maryam_pro2_chats', JSON.stringify(allChats));

            if(response.includes('maryam-calc-box') || response.includes('tesla-battery-card')) {
                textContainer.innerHTML = response; chatWindow.scrollTop = chatWindow.scrollHeight;
            } else {
                let i = 0;
                function typeWriter() {
                    if (i < response.length) { textContainer.innerHTML = response.substring(0, i + 1); i++; chatWindow.scrollTop = chatWindow.scrollHeight; setTimeout(typeWriter, 12); } 
                    else { speak(response); }
                }
                typeWriter();
            }
        }, 1200);
    }

    function appendMessageHTML(text, sender, isThinking = false) {
        const row = document.createElement('div'); row.className = `message-row ${sender}`;
        let innerBody = isThinking ? `<div class="thinking-dots"><span></span><span></span><span></span></div>` : (sender === 'ai' ? `<button class="play-audio-btn" onclick="speak(\`${text.replace(/`/g, '\\`').replace(/"/g, '&quot;')}\`)">▶ Ovozni eshitish</button><div>${text}</div>` : text);
        row.innerHTML = `${sender === 'ai' ? `<div class="avatar"></div>` : ''}<div class="content">${innerBody}</div>${sender === 'user' ? `<div class="avatar">Siz</div>` : ''}`;
        chatWindow.appendChild(row); chatWindow.scrollTop = chatWindow.scrollHeight; return row;
    }

    if ('webkitSpeechRecognition' in window) {
        const recognition = new webkitSpeechRecognition(); recognition.lang = 'uz-UZ';
        voiceBtn.onclick = () => { 
            recognition.start(); 
            voiceBtn.style.color = "#a5b4fc"; 
            voiceWave.style.display = "flex"; 
            userInput.style.visibility = "hidden"; 
        };
        recognition.onresult = (event) => { userInput.value = event.results[0][0].transcript; stopVoiceAnimation(); handleMessage(); };
        recognition.onerror = () => { stopVoiceAnimation(); }; recognition.onend = () => { stopVoiceAnimation(); };
    }
    
    function stopVoiceAnimation() { 
        voiceBtn.style.color = "#b4b4b4"; 
        voiceWave.style.display = "none"; 
        userInput.style.visibility = "visible"; 
        userInput.placeholder = "Спросите Maryam"; 
    }

    sendBtn.onclick = handleMessage;
    userInput.onkeypress = (e) => { if (e.key === 'Enter') handleMessage(); };
</script>
